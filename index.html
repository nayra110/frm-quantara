<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VRM Web Viewer - Eye & Physics</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>
<div id="info">Gunakan Mouse untuk Putar Kamera (Physics & Eye Tracking Aktif)</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    // --- 1. SETUP SCENE & RENDERER ---
    const scene = new THREE.Scene();
    const clock = new THREE.Clock();
    
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // --- 2. LIGHTING (Agar tekstur VRoid terlihat cerah) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(1, 1, 1).normalize();
    scene.add(dirLight);

    // --- 3. CONTROLS ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // Membuat putaran kamera lebih halus
    controls.dampingFactor = 0.05;
    controls.target.set(0, 1.3, 0);

    // --- 4. LOAD VRM MODEL ---
    let currentVrm = null;
    const loader = new GLTFLoader();
    
    // Registrasi Plugin VRM
    loader.register((parser) => {
        return new VRMLoaderPlugin(parser);
    });

    loader.load(
        'model/model.vrm', // GANTI DENGAN PATH FILE KAMU
        (gltf) => {
            const vrm = gltf.userData.vrm;
            currentVrm = vrm;
            
            // Tambahkan model ke scene
            scene.add(vrm.scene);

            // 1. AKTIFKAN EYE TRACKING
            vrm.lookAt.target = camera;

            // 2. HADAPKAN KE DEPAN (Karena default VRM biasanya membelakangi kamera)
            vrm.scene.rotation.y = Math.PI; 

            console.log("VRM Model Loaded!", vrm);
        },
        (progress) => console.log('Loading...', (progress.loaded / progress.total * 100) + '%'),
        (error) => console.error('Gagal memuat model:', error)
    );

    // --- 5. ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        const deltaTime = clock.getDelta();
        const elapsedTime = clock.getElapsedTime();

        if (currentVrm) {
            // Memberikan sedikit goyangan 'idle' agar rambut/rok tidak kaku
            // Math.sin memberikan gerakan ayunan halus secara otomatis
            currentVrm.scene.position.y = Math.sin(elapsedTime * 0.5) * 0.005;

            // PENTING: Update semua state VRM (Physics, Mata, Ekspresi)
            currentVrm.update(deltaTime);
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // --- 6. HANDLE WINDOW RESIZE ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
