<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VRM Web Viewer</title>
    <style>
        body { margin: 0; background-color: #eee; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    // 1. Setup Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.3, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. Pencahayaan
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);

    // 3. Kontrol Kamera (bisa diputar dengan mouse)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.3, 0);
    controls.update();

    // 4. Load Model .vrm
    const loader = new GLTFLoader();
    
    // Daftarkan plugin VRM ke loader
    loader.register((parser) => new VRMLoaderPlugin(parser));

    loader.load(
        './model.vrm', // GANTI DENGAN NAMA FILE KAMU
        (gltf) => {
            const vrm = gltf.userData.vrm;
            scene.add(vrm.scene);
            console.log("Model berhasil dimuat!", vrm);
        },
        (progress) => console.log('Loading...', (progress.loaded / progress.total * 100) + '%'),
        (error) => console.error('Terjadi kesalahan:', error)
    );

    // 5. Animasi Loop
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
