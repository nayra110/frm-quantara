<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VRM Web Viewer - Fixed Physics</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    // --- SETUP ---
    const scene = new THREE.Scene();
    const clock = new THREE.Clock();
    
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 3.0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; 
    controls.target.set(0, 1.3, 0);

    // --- VRM LOAD ---
    let currentVrm = null;
    const loader = new GLTFLoader();
    
    loader.register((parser) => {
        // Tambahkan helper manual agar spring bone selalu sinkron
        return new VRMLoaderPlugin(parser, { autoUpdateHumanBones: true });
    });

    loader.load(
        'model/model.vrm', // Ganti dengan file kamu
        (gltf) => {
            const vrm = gltf.userData.vrm;
            currentVrm = vrm;
            scene.add(vrm.scene);
            vrm.scene.rotation.y = Math.PI; 
            
            // Set target mata ke kamera
            vrm.lookAt.target = camera;

            console.log("Model loaded!");
        }
    );

    // --- LOGIKA BERKEDIP (Blink) ---
    let blinkTimer = 0;
    function updateBlink(vrm, delta) {
        blinkTimer += delta;
        if (blinkTimer > 4.0) { // Berkedip setiap 4 detik
            const s = Math.sin(blinkTimer * 10.0); // Kecepatan kedipan
            const blinkValue = Math.max(0, s);
            vrm.expressionManager.setValue('blink', blinkValue);
            if (blinkTimer > 4.2) blinkTimer = 0;
        }
    }

    // --- ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();

        if (currentVrm) {
            // TRIK PHYSICS: Berikan sedikit rotasi halus terus menerus
            // Ini memicu SpringBone agar selalu menghitung pergerakan rambut/rok
            currentVrm.scene.rotation.y = Math.PI + (Math.sin(elapsed * 0.5) * 0.02);
            
            // Update kedipan mata
            updateBlink(currentVrm, delta);

            // PENTING: Update semua sistem VRM
            currentVrm.update(delta);
        }

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
