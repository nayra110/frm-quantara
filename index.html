<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VRM Web Viewer - Eye Tracking & Auto Blink</title>
    <style>
        body { margin: 0; background-color: #eee; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    // --- 1. Setup Scene ---
    const scene = new THREE.Scene();
    const clock = new THREE.Clock();
    let currentVrm = null;

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 1.5); // Posisi lebih dekat ke wajah

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- 2. Pencahayaan ---
    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    // --- 3. Kontrol Kamera ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.3, 0);
    controls.update();

    // --- 4. Load Model .vrm ---
    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    loader.load(
        'model/model.vrm', // PASTIKAN FILE INI ADA DI FOLDER YANG BENAR
        (gltf) => {
            const vrm = gltf.userData.vrm;
            currentVrm = vrm;
            
            // Nonaktifkan frustum culling agar model tidak hilang saat zoom in
            vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

            scene.add(vrm.scene);

            // FITUR 1: Mata mengikuti kamera
            vrm.lookAt.target = camera;

            console.log("Model berhasil dimuat!", vrm);
        },
        (progress) => console.log('Loading...', (progress.loaded / progress.total * 100) + '%'),
        (error) => console.error('Terjadi kesalahan:', error)
    );

    // --- 5. Logika Kedip Lembut (Blinking) ---
    let blinkTimer = 0;
    let isBlinking = false;

    function updateBlinking(vrm, delta) {
        blinkTimer += delta;

        // Karakter akan kedip setiap 3 detik secara rata-rata
        if (blinkTimer > 3.0 && !isBlinking) {
            isBlinking = true;
            blinkTimer = 0;
        }

        if (isBlinking) {
            // Animasi menutup mata (0 ke 1) dan membuka kembali (1 ke 0)
            // Menggunakan durasi sekitar 0.15 detik untuk kedipan cepat tapi halus
            const blinkDuration = 0.15;
            const progress = blinkTimer / blinkDuration;

            if (progress <= 1.0) {
                // Fase menutup dan membuka (Sine wave sederhana)
                const value = Math.sin(progress * Math.PI);
                vrm.expressionManager.setValue('blink', value);
            } else {
                vrm.expressionManager.setValue('blink', 0);
                isBlinking = false;
                blinkTimer = Math.random() * -2; // Randomize waktu kedip berikutnya (1-3 detik)
            }
        }
    }

    // --- 6. Animasi Loop ---
    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        if (currentVrm) {
            // Update VRM (Internal clock untuk LookAt dan SpringBone)
            currentVrm.update(delta);

            // Update Fitur Kedip
            updateBlinking(currentVrm, delta);
        }

        renderer.render(scene, camera);
    }

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
