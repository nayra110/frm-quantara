<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VRM Web Viewer - Interactive</title>
    <style>
        body { margin: 0; background-color: #222; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="info">
    <b>VRoid Live Viewer</b><br>
    - Mouse: Putar Kamera<br>
    - Scroll: Zoom
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    // Global variables
    let currentVrm = null;
    const clock = new THREE.Clock();

    // --- 1. SETUP SCENE ---
    const scene = new THREE.Scene();
    
    // Kamera
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 3.5);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // --- 2. LIGHTING (Pencahayaan) ---
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
    sunLight.position.set(1, 2, 3);
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    // --- 3. CONTROLS ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.3, 0); // Fokus ke area wajah
    controls.enableDamping = true;
    controls.update();

    // --- 4. LOAD VRM MODEL ---
    const loader = new GLTFLoader();
    
    // Install VRM Plugin
    loader.register((parser) => {
        return new VRMLoaderPlugin(parser);
    });

    loader.load(
        'model/model.vrm', // GANTI SESUAI NAMA FILE KAMU
        (gltf) => {
            const vrm = gltf.userData.vrm;
            currentVrm = vrm;

            // Tambahkan model ke scene
            scene.add(vrm.scene);

            // VRM secara default menghadap -Z, kita putar agar menghadap kamera (+Z)
            vrm.scene.rotation.y = Math.PI;

            // Setup LookAt agar mata mengikuti kamera
            vrm.lookAt.target = camera;

            console.log("Model Berhasil Dimuat!", vrm);
        },
        (progress) => {
            console.log('Loading...', Math.round((progress.loaded / progress.total) * 100) + '%');
        },
        (error) => console.error('Error saat memuat model:', error)
    );

    // --- 5. ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        const deltaTime = clock.getDelta();
        const elapsedTime = clock.getElapsedTime();

        if (currentVrm) {
            // A. Gerakan Rambut & Baju (Spring Bone)
            currentVrm.springBoneManager.update(deltaTime);

            // B. Mata Mengikuti Kamera (LookAt)
            currentVrm.lookAt.update(deltaTime);

            // C. Kedip Otomatis (Auto Blink)
            // Karakter akan berkedip setiap beberapa detik menggunakan sin wave
            const blinkStrength = Math.sin(elapsedTime * 2); 
            // Jika nilai sin sangat tinggi (mendekati 1), karakter tutup mata
            const isBlinking = blinkStrength > 0.97; 
            
            currentVrm.expressionManager.setValue('blink', isBlinking ? 1.0 : 0.0);
            
            // D. Update Ekspresi
            currentVrm.expressionManager.update();
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
