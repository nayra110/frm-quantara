<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM Avatar AI dengan Groq</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #chat-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 20px;
            color: white;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        #messages {
            height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #888 #333;
        }
        
        #messages::-webkit-scrollbar {
            width: 8px;
        }
        
        #messages::-webkit-scrollbar-track {
            background: #333;
            border-radius: 4px;
        }
        
        #messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        
        .message {
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: #007bff;
            align-self: flex-end;
        }
        
        .ai-message {
            background: #28a745;
            align-self: flex-start;
        }
        
        #input-area {
            display: flex;
            gap: 10px;
        }
        
        #user-input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        #user-input:focus {
            outline: none;
            border-color: #007bff;
        }
        
        #send-btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        #send-btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
        
        #send-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        #status {
            text-align: center;
            font-size: 14px;
            color: #ffc107;
        }
        
        #loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #17a2b8;
        }
        
        #error-message {
            color: #dc3545;
            text-align: center;
            margin-top: 10px;
            display: none;
            padding: 10px;
            background: rgba(220, 53, 69, 0.2);
            border-radius: 5px;
        }
        
        #model-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="chat-container">
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Ketik pesan Anda..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" onclick="sendMessage()">Kirim</button>
            </div>
            <div id="status">Memuat avatar...</div>
            <div id="loading">AI sedang berpikir...</div>
            <div id="error-message"></div>
        </div>
        <div id="model-info"></div>
    </div>

    <!-- Import library yang diperlukan -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@0.6.11/lib/three-vrm.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as VRM from '@pixiv/three-vrm';

        // Konfigurasi
        const GROQ_API_KEY = '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'; // Ganti dengan API key Anda
        const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        
        // State
        let currentVRM = null;
        let clock = new THREE.Clock();
        let isModelLoading = false;
        let talkingAnimation = null;
        let idleAnimation = null;
        
        // Inisialisasi Three.js
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0.0, 1.2, 5.0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.screenSpacePanning = true;
        controls.target.set(0.0, 1.2, 0.0);
        controls.maxPolarAngle = Math.PI / 2;
        controls.minDistance = 3;
        controls.maxDistance = 8;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        // Main directional light
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(2.0, 3.0, 2.0);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 10.0;
        directionalLight.shadow.camera.left = -3;
        directionalLight.shadow.camera.right = 3;
        directionalLight.shadow.camera.top = 3;
        directionalLight.shadow.camera.bottom = -3;
        scene.add(directionalLight);
        
        // Fill light
        const fillLight = new THREE.DirectionalLight(0xffeedd, 0.5);
        fillLight.position.set(-2.0, 1.0, 2.0);
        scene.add(fillLight);
        
        // Back light
        const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
        backLight.position.set(0.0, 1.0, -3.0);
        scene.add(backLight);
        
        // Ground grid
        const gridHelper = new THREE.GridHelper(10, 20, 0x888888, 0x444444);
        gridHelper.position.y = 0;
        scene.add(gridHelper);
        
        // Simple floor for shadows
        const floorGeometry = new THREE.PlaneGeometry(10, 10);
        const floorMaterial = new THREE.ShadowMaterial({ opacity: 0.3 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Soft lighting helper
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);
        
        // Load VRM Model from local file
        async function loadVRM() {
            if (isModelLoading) return;
            isModelLoading = true;
            
            const statusEl = document.getElementById('status');
            const errorEl = document.getElementById('error-message');
            const modelInfoEl = document.getElementById('model-info');
            
            statusEl.textContent = 'Memuat avatar...';
            errorEl.style.display = 'none';
            
            // Gunakan GLTFLoader untuk memuat file VRM
            const loader = new GLTFLoader();
            
            // Daftarkan plugin VRM dengan cara yang benar
            loader.register((parser) => {
                return new VRM.VRMLoaderPlugin(parser, {
                    helperRoot: scene,
                    autoUpdateHumanBones: true
                });
            });
            
            try {
                // Path ke file VRM lokal
                const modelUrl = 'model/model.vrm';
                
                console.log('Mencoba memuat model dari:', modelUrl);
                modelInfoEl.textContent = 'Loading: ' + modelUrl;
                
                // Load model
                const gltf = await loader.loadAsync(modelUrl);
                
                // Dapatkan VRM instance
                const vrm = gltf.userData.vrm;
                
                if (!vrm) {
                    throw new Error('File bukan format VRM yang valid');
                }
                
                // Rotasi model agar berdiri tegak
                VRM.VRMUtils.rotateVRM0(vrm);
                
                // Setup scene
                scene.add(vrm.scene);
                currentVRM = vrm;
                
                // Update shadow
                vrm.scene.traverse((obj) => {
                    if (obj.isMesh) {
                        obj.castShadow = true;
                        obj.receiveShadow = true;
                    }
                });
                
                console.log('VRM model berhasil dimuat');
                statusEl.textContent = 'Avatar siap!';
                modelInfoEl.textContent = 'Model: ' + (vrm.meta?.title || 'Unknown') + ' by ' + (vrm.meta?.author || 'Unknown');
                
                // Setup idle animation
                setupIdleAnimation();
                
            } catch (error) {
                console.error('Error loading VRM:', error);
                statusEl.textContent = 'Gagal memuat avatar';
                errorEl.style.display = 'block';
                errorEl.textContent = 'Error: ' + error.message + '. Pastikan file model.vrm ada di folder model/';
                modelInfoEl.textContent = 'Error loading model';
            } finally {
                isModelLoading = false;
            }
        }
        
        // Setup idle animation
        function setupIdleAnimation() {
            if (!currentVRM) return;
            
            let time = 0;
            
            idleAnimation = () => {
                if (!currentVRM) return;
                
                time += 0.01;
                
                // Gentle swaying animation
                if (currentVRM.humanoid) {
                    try {
                        const hips = currentVRM.humanoid.getNormalizedBoneNode('hips');
                        if (hips) {
                            hips.rotation.y = Math.sin(time * 0.5) * 0.02;
                        }
                        
                        const chest = currentVRM.humanoid.getNormalizedBoneNode('chest');
                        if (chest) {
                            chest.rotation.x = Math.sin(time * 0.8) * 0.01;
                            chest.rotation.z = Math.sin(time * 0.6) * 0.01;
                        }
                        
                        const head = currentVRM.humanoid.getNormalizedBoneNode('head');
                        if (head) {
                            head.rotation.x = Math.sin(time * 0.3) * 0.01;
                            head.rotation.y = Math.sin(time * 0.2) * 0.02;
                        }
                    } catch (e) {
                        // Ignore animation errors
                    }
                }
            };
        }
        
        // Talking animation
        function startTalking() {
            if (!currentVRM || !currentVRM.humanoid) return;
            
            let jawTime = 0;
            
            // Clear existing animation
            if (talkingAnimation) {
                cancelAnimationFrame(talkingAnimation);
            }
            
            const animateJaw = () => {
                if (!currentVRM) return;
                
                try {
                    const jaw = currentVRM.humanoid.getNormalizedBoneNode('jaw');
                    if (jaw) {
                        jawTime += 0.3;
                        jaw.rotation.x = 0.1 + Math.sin(jawTime) * 0.1;
                    }
                } catch (e) {
                    // Ignore jaw animation errors
                }
                
                talkingAnimation = requestAnimationFrame(animateJaw);
            };
            
            animateJaw();
        }
        
        function stopTalking() {
            if (talkingAnimation) {
                cancelAnimationFrame(talkingAnimation);
                talkingAnimation = null;
            }
            
            if (!currentVRM || !currentVRM.humanoid) return;
            
            try {
                const jaw = currentVRM.humanoid.getNormalizedBoneNode('jaw');
                if (jaw) {
                    jaw.rotation.x = 0;
                }
            } catch (e) {
                // Ignore errors
            }
        }
        
        function nodHead() {
            if (!currentVRM || !currentVRM.humanoid) return;
            
            try {
                const head = currentVRM.humanoid.getNormalizedBoneNode('head');
                if (head) {
                    head.rotation.x = -0.2;
                    setTimeout(() => {
                        if (head) head.rotation.x = 0;
                    }, 300);
                }
            } catch (e) {
                // Ignore errors
            }
        }
        
        // AI Functions
        async function getAIResponse(userMessage) {
            const loadingEl = document.getElementById('loading');
            const sendBtn = document.getElementById('send-btn');
            
            loadingEl.style.display = 'block';
            sendBtn.disabled = true;
            startTalking();
            
            try {
                const response = await fetch(GROQ_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'mixtral-8x7b-32768',
                        messages: [
                            {
                                role: 'system',
                                content: 'Anda adalah asisten AI yang ramah dan membantu. Berikan jawaban dalam bahasa Indonesia.'
                            },
                            {
                                role: 'user',
                                content: userMessage
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });
                
                const data = await response.json();
                
                if (data.choices && data.choices.length > 0) {
                    return data.choices[0].message.content;
                } else {
                    throw new Error('No response from API');
                }
            } catch (error) {
                console.error('Error calling Groq API:', error);
                return 'Maaf, terjadi kesalahan saat memproses pesan Anda.';
            } finally {
                loadingEl.style.display = 'none';
                sendBtn.disabled = false;
                stopTalking();
                nodHead();
            }
        }
        
        // Chat functions
        function addMessage(text, isUser) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            
            const response = await getAIResponse(message);
            addMessage(response, false);
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            if (currentVRM) {
                try {
                    currentVRM.update(delta);
                } catch (e) {
                    // Ignore animation errors
                }
            }
            
            if (idleAnimation) {
                idleAnimation();
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Initialize
        loadVRM();
        animate();
        
        // Export functions to global scope
        window.sendMessage = sendMessage;
        window.handleKeyPress = handleKeyPress;
        
        console.log('Aplikasi siap. Menunggu model VRM...');
    </script>
</body>
</html>
