<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Avatar VRM x Groq</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: rgba(0, 0, 0, 0.7);
            padding: 20px; border-radius: 15px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #response-text { margin-bottom: 15px; font-style: italic; color: #ffabf1; min-height: 20px; text-align: center; }
        
        .input-group { display: flex; gap: 10px; }
        input { 
            flex: 1; padding: 12px; border-radius: 8px; border: none; 
            background: #333; color: white; outline: none;
        }
        button { 
            padding: 10px 20px; border-radius: 8px; border: none; 
            background: #ff4081; color: white; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #f50057; transform: scale(1.05); }
        button:disabled { background: #555; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="response-text">Halo! Ketik sesuatu untuk mulai mengobrol.</div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Tanya sesuatu ke Groq AI...">
            <button id="sendBtn">Kirim</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
            "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.2/lib/three-vrm.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        // --- KONFIGURASI GROQ ---
        const GROQ_API_KEY = "MASUKKAN_API_KEY_KAMU_DISINI";

        // --- SETUP SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.3, 1.2); // Fokus ke area wajah/dada

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        // --- LOAD MODEL ---
        let currentVrm = null;
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        loader.load(
            './model/model.vrm', 
            (gltf) => {
                const vrm = gltf.userData.vrm;
                VRMUtils.removeUnusedVertices(gltf.scene);
                currentVrm = vrm;
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI; // Putar balik agar hadap depan
                console.log("VRM Loaded!");
            }
        );

        // --- ANIMASI LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        // --- FUNGSI BICARA & LIP-SYNC ---
        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'id-ID'; // Suara bahasa Indonesia

            // Trigger gerakan mulut
            utter.onstart = () => {
                const moveMouth = setInterval(() => {
                    if (!synth.speaking) {
                        currentVrm.expressionManager.setValue("ih", 0);
                        clearInterval(moveMouth);
                        return;
                    }
                    // Gerakan mulut acak agar terlihat natural
                    currentVrm.expressionManager.setValue("ih", Math.random() * 0.6);
                }, 100);
            };

            synth.speak(utter);
        }

        // --- KONEKSI GROQ AI ---
        async function chat() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const responseDiv = document.getElementById('response-text');
            const query = input.value;

            if (!query) return;
            
            btn.disabled = true;
            responseDiv.innerText = "Sedang berpikir...";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            { role: "system", content: "Kamu adalah asisten VRM yang lucu. Jawab maksimal 15 kata." },
                            { role: "user", content: query }
                        ]
                    })
                });

                const data = await res.json();
                const reply = data.choices[0].message.content;
                
                responseDiv.innerText = reply;
                speak(reply); // Jalankan suara & lip-sync

            } catch (err) {
                responseDiv.innerText = "Error: Cek API Key atau koneksi.";
                console.error(err);
            } finally {
                btn.disabled = false;
                input.value = "";
            }
        }

        document.getElementById('sendBtn').onclick = chat;
        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        };
    </script>
</body>
</html>
