<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VRM Web Viewer - Eye Tracking</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    // --- 1. SETUP SCENE ---
    const scene = new THREE.Scene();
    const clock = new THREE.Clock(); // Penting untuk animasi & lookAt
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 2.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- 2. LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(1, 1, 1).normalize();
    scene.add(dirLight);

    // --- 3. CONTROLS ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.screenSpacePanning = true;
    controls.target.set(0, 1.3, 0);
    controls.update();

    // --- 4. LOAD VRM ---
    let currentVrm = null;
    const loader = new GLTFLoader();
    
    // Registrasi Plugin VRM
    loader.register((parser) => {
        return new VRMLoaderPlugin(parser);
    });

    loader.load(
        'model/model.vrm', // Ganti dengan path file .vrm milikmu
        (gltf) => {
            const vrm = gltf.userData.vrm;
            currentVrm = vrm;
            
            // Masukkan model ke scene
            scene.add(vrm.scene);

            // MEMBUAT MATA MENGIKUTI KAMERA
            vrm.lookAt.target = camera;

            // Opsional: Memutar model agar menghadap depan jika terbalik
            vrm.scene.rotation.y = Math.PI; 

            console.log("Model Loaded!", vrm);
        },
        (progress) => {
            console.log('Loading...', (progress.loaded / progress.total * 100) + '%');
        },
        (error) => console.error('Error:', error)
    );

    // --- 5. ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        // Ambil delta time (selisih waktu antar frame)
        const deltaTime = clock.getDelta();

        if (currentVrm) {
            // Update fitur VRM (LookAt, SpringBone, Expression, dll)
            currentVrm.update(deltaTime);
        }

        renderer.render(scene, camera);
    }

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
