<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VRM + Mixamo Fixed</title>
    <style>
        body { margin: 0; background-color: #eee; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
      "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    // --- 1. Setup Scene ---
    const scene = new THREE.Scene();
    const clock = new THREE.Clock();
    let currentVrm = null;
    let mixer = null;

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 2.0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    // Mengatasi warning "encodings_fragment"
    renderer.outputColorSpace = THREE.SRGBColorSpace; 
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.1, 0);
    controls.update();

    // --- 2. Fungsi Load Animasi Mixamo yang Diperbaiki ---
    function loadMixamoAnimation(url, vrm) {
        const loader = new GLTFLoader();
        loader.load(url, (gltf) => {
            const clip = gltf.animations[0];
            mixer = new THREE.AnimationMixer(vrm.scene);

            // Perbaikan Mapping Tulang:
            // Mixamo menggunakan nama seperti "mixamorigLeftArm"
            // VRM menggunakan struktur humanoid yang ketat.
            const tracks = [];

            clip.tracks.forEach((track) => {
                const trackName = track.name;
                // Ambil nama tulang dari track (misal: mixamorig_RightArm.quaternion -> RightArm)
                const boneName = trackName.split('.')[0].replace('mixamorig_', '');
                const propertyName = trackName.split('.')[1];

                // Cari tulang yang sesuai di VRM
                // Kita coba cari tulang berdasarkan nama standar (vRoid biasanya pakai nama Inggris)
                const vrmBone = vrm.humanoid.getBoneNode(boneName.charAt(0).toLowerCase() + boneName.slice(1));
                
                if (vrmBone) {
                    // Buat track baru dengan nama tulang VRM yang asli
                    const newTrack = track.clone();
                    newTrack.name = `${vrmBone.name}.${propertyName}`;
                    tracks.push(newTrack);
                }
            });

            if (tracks.length > 0) {
                const newClip = new THREE.AnimationClip(clip.name, clip.duration, tracks);
                mixer.clipAction(newClip).play();
                console.log("Animasi berhasil dipetakan!");
            } else {
                // Jika mapping otomatis gagal, mainkan apa adanya (mungkin nama tulang sudah pas)
                mixer.clipAction(clip).play();
                console.warn("Mapping otomatis gagal, memainkan animasi default.");
            }
        });
    }

    // --- 3. Load Model VRM ---
    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    loader.load(
        'model/model.vrm', 
        (gltf) => {
            const vrm = gltf.userData.vrm;
            currentVrm = vrm;
            
            VRMUtils.rotateVRM0(vrm); 
            scene.add(vrm.scene);
            vrm.lookAt.target = camera;

            // Memuat animasi
            loadMixamoAnimation('animations/idle.glb', vrm);
        },
        undefined,
        (error) => console.error(error)
    );

    // --- 4. Logic Kedip ---
    let blinkTimer = 0;
    let isBlinking = false;
    function updateBlinking(vrm, delta) {
        blinkTimer += delta;
        if (blinkTimer > 3.0 && !isBlinking) { isBlinking = true; blinkTimer = 0; }
        if (isBlinking) {
            const progress = blinkTimer / 0.15;
            if (progress <= 1.0) {
                vrm.expressionManager.setValue('blink', Math.sin(progress * Math.PI));
            } else {
                vrm.expressionManager.setValue('blink', 0);
                isBlinking = false;
                blinkTimer = Math.random() * -2;
            }
        }
    }

    // --- 5. Animasi Loop ---
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (currentVrm) {
            if (mixer) mixer.update(delta);
            currentVrm.update(delta);
            updateBlinking(currentVrm, delta);
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
